<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Indian Stock Screener</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f9fafb;
        color: #111827;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px;
        max-width: 420px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.2rem;
      }
      p {
        margin: 0;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Reconnect to load the latest stock data and continue analysis.</p>
    </div>
  </body>
</html>
